name: Refresh public market data

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      datasets:
        description: "all or comma-separated lanes: weather,news,jepx_market,offer_stack,supply_mix"
        required: false
        default: "all"

permissions:
  contents: write

concurrency:
  group: public-market-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out application code
        uses: actions/checkout@v4
        with:
          ref: main
          path: app

      - name: Check out published data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: published

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r requirements.txt
        working-directory: app

      - name: Refresh compact public datasets
        env:
          REQUESTED_DATASETS: ${{ inputs.datasets || 'all' }}
        run: >-
          PYTHONPATH=.
          python -m src.public_data_pipeline
          --output-dir ../published/data/published
          --datasets "$REQUESTED_DATASETS"
        working-directory: app

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published
          if git diff --cached --quiet; then
            echo "No published data changes."
          else
            git commit -m "data: refresh public market artifacts"
            git push origin data
          fi
        working-directory: published
